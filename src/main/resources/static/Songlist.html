<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SongList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container text-center p-5 bg-white rounded shadow w-50">
        <div class="d-flex justify-content-start">
            <a href="index.html" class="btn btn-danger"><- Voltar</a>
        </div>
        <div class="mb-3">
            <label for="pesquisarMusicas" class="form-label">Pesquisar Musicas</label>

            <div class="input-group">
                <input type="text" class="form-control" id="pesquisarMusicas">
                <button class="btn btn-primary" type="button">
                    Pesquisar
                </button>
            </div>
        </div>
        <hr>
        <table id="tabela" border="1" class="table table-striped">
            <thead><td class="table-primary">Título</td><td class="table-primary">Artista</td><td class="table-primary">Estilo</td><td class="table-primary">Play</td></thead>
            <tbody id="resultado">
            </tbody>
        </table>

    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</html>
