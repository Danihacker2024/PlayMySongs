<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./css/style.css">
    <meta charset="UTF-8">
    <title>Cadastro de Música</title>
</head>
<body>
<div class="main-container">
    <div class="form-wrapper">
        <img
                src="./imgs/icon.png"
                alt="Lead Form Illustration"
                class="form-image"
        />
        <form action="" method="POST">
            <!-- Title and Description -->
            <div class="form-header">
                <h2 class="form-title">PlayMySongs</h2>
                <p class="form-description">
                    Cadastro de Músicas para o PlayMySongs. Preencha o formulário abaixo para enviar suas músicas e compartilhar seu talento com o mundo!
                </p>
            </div>
            <!-- Essential Fields -->
            <div class="form-group">
                <label class="form-label">Nome da Música*</label>
                <input
                        type="text"
                        name="music-name"
                        id="music-name"
                        class="form-input"
                        required
                />
            </div>
            <div class="form-group">
                <label class="form-label">Nome do Artista*</label>
                <input
                        type="text"
                        name="artist-name"
                        id="artist-name"
                        class="form-input"
                        required
                />
            </div>
            <div class="form-group">
                <label for="style" class="form-label"
                >Estilo Musical*</label
                >
                <select name="style" id="style" class="form-select" required>
                    <option value="">Selecione um Estilo</option>
                    <option value="pop">Pop</option>
                    <option value="rock">Rock</option>
                    <option value="jazz">Jazz</option>
                    <option value="classical">Clássica</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label"
                >Arquivo da Música*</label
                >
                <input
                        type="file"
                        name="music-file"
                        id="music-file"
                        class="form-input"
                        required
                />
            </div>
            <!-- Compliance & Consent -->
            <div class="consent-group">
                <input
                        type="checkbox"
                        id="consent"
                        class="form-checkbox"
                        required
                />
                <label for="consent" class="consent-label">
                    Eu concordo que os dados fornecidos neste formulário sejam coletados e processados de acordo com a política de privacidade do PlayMySongs.
                </label>
            </div>
            <!-- Optional Privacy Policy and GDPR Notice -->
            <div class="privacy-links">
                <a href="#">Politica de Privacidade</a> |
                <a href="#">Aviso GDPR</a>
            </div>
            <!-- Submit Button -->
            <div class="d-flex gap-2">
                <button type="submit" class="submit-btn w-100">Enviar</button>
                <a href="index.html" class="w-100 text-decoration-none">
                    <button type="button" class="submit-btn w-100">Voltar</button>
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
